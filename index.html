<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackjack Deluxe</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="table">

    <header>
        <h1>♠ Blackjack Deluxe ♦</h1>

        <div class="bank">
            <span>Bankroll</span>
            <h2 id="money">$1000</h2>
        </div>
    </header>

    <section class="dealer">

        <h2>Dealer</h2>

        <div id="dealerCards" class="cards"></div>

        <h3 id="dealerScore">Score: ?</h3>

    </section>

    <div class="middle">

        <div class="shoe">
            🂠
        </div>

        <div class="bet-area">

            <h2 id="betDisplay">Current Bet: $0</h2>

            <div class="chips">

                <button class="chip" data-value="5">$5</button>

                <button class="chip blue" data-value="25">$25</button>

                <button class="chip green" data-value="100">$100</button>

                <button class="chip black" data-value="500">$500</button>

            </div>

        </div>

    </div>

    <section class="player">

        <h2>Player</h2>

        <div id="playerCards" class="cards"></div>

        <h3 id="playerScore">Score: 0</h3>

    </section>

    <div class="controls">

        <button id="dealBtn">Deal</button>

        <button id="hitBtn">Hit</button>

        <button id="standBtn">Stand</button>

    </div>

    <h2 id="message">

        Place a bet to begin.

    </h2>

</div>

<script src="script.js"></script>

</body>
</html>
