<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Blackjack</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="game">

<h1>♠ Blackjack ♦</h1>

<div class="money">
Bankroll: $<span id="money">1000</span>
</div>

<div class="table">

<div class="hand">

<h2>Dealer</h2>

<div id="dealerCards" class="cards"></div>

<p id="dealerScore">Score: ?</p>

</div>


<div class="hand">

<h2>You</h2>

<div id="playerCards" class="cards"></div>

<p id="playerScore">Score: 0</p>

</div>

</div>


<div class="bet">

<h3>Bet: $<span id="bet">0</span></h3>

<button onclick="addBet(10)">+$10</button>
<button onclick="addBet(50)">+$50</button>
<button onclick="addBet(100)">+$100</button>

</div>


<div class="buttons">

<button onclick="deal()">Deal</button>

<button onclick="hit()">Hit</button>

<button onclick="stand()">Stand</button>

</div>


<h2 id="message">
Place a bet
</h2>


</div>


<script src="script.js"></script>

</body>
</html>
