<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blackjack Deluxe</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="table">

<header>

<h1>♠ BLACKJACK ♦</h1>

<div class="bank">
Bankroll
<span id="money">$1000</span>
</div>

</header>

<section class="dealer">

<h2>Dealer</h2>

<div id="dealerCards" class="cards">

</div>

<div id="dealerScore">Score: ?</div>

</section>

<div class="center">

<div class="shoe">

🂠

</div>

<div class="betCircle">

BET

</div>

</div>

<section class="player">

<h2>Player</h2>

<div id="playerCards" class="cards">

</div>

<div id="playerScore">

Score: 0

</div>

</section>

<div class="chips">

<button class="chip" data-value="5">$5</button>

<button class="chip" data-value="25">$25</button>

<button class="chip" data-value="100">$100</button>

<button class="chip" data-value="500">$500</button>

</div>

<h2 id="betDisplay">
Current Bet: $0
</h2>

<div class="controls">

<button id="dealBtn">Deal</button>

<button id="hitBtn">Hit</button>

<button id="standBtn">Stand</button>

<button id="doubleBtn">Double</button>

<button id="splitBtn">Split</button>

</div>

<p id="message">

Welcome to Blackjack Deluxe

</p>

</div>

<script src="script.js"></script>

</body>
</html>
